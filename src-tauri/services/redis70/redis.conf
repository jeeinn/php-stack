# Redis 7.0 配置文件
# 基于官方配置 + dnmp 优化
# 生成时间: 2026-04-25
# 参考来源: 
#   - 官方: https://raw.githubusercontent.com/redis/redis/7.0/redis.conf
#   - dnmp: services/redis/redis-7.0.conf

################################## NETWORK #####################################

# 绑定地址：允许所有接口访问（Docker 容器内）
bind 0.0.0.0

# 保护模式：禁用（Docker 网络隔离已提供安全性）
protected-mode no

# 监听端口
port 6379

# TCP  backlog
tcp-backlog 511

# 超时关闭空闲连接（0 = 禁用）
timeout 0

# TCP keepalive
tcp-keepalive 300

################################## GENERAL #####################################

# 以守护进程方式运行（Docker 中应为 no）
daemonize no

#  supervised 模式
supervised no

# PID 文件
pidfile /var/run/redis_6379.pid

# 日志级别
loglevel notice

# 日志文件路径（空字符串表示输出到 stdout，适合 Docker）
logfile ""

# 数据库数量
databases 16

# 始终显示 Logo
always-show-logo yes

################################ SNAPSHOTTING  ################################

# RDB 持久化配置
save 900 1
save 300 10
save 60 10000

# RDB 失败时停止写入
stop-writes-on-bgsave-error yes

# RDB 文件压缩
rdbcompression yes

# RDB 文件校验和
rdbchecksum yes

# RDB 文件名
dbfilename dump.rdb

# 工作目录（数据文件存放位置）
dir ./

############################## APPEND ONLY MODE ###############################

# AOF 持久化
appendonly no

# AOF 文件名
appendfilename "appendonly.aof"

# AOF 持久化策略
# appendfsync always
appendfsync everysec
# appendfsync no

# 重写 AOF 时不同步
no-appendfsync-on-rewrite no

# AOF 自动重写触发条件
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# AOF 加载截断
aof-load-truncated yes

# AOF 使用 RDB 前缀
aof-use-rdb-preamble yes

################################## SECURITY ###################################

# 密码认证（生产环境建议启用）
# requirepass your_password_here

# 重命名危险命令
# rename-command CONFIG b840fc02d524045429941cc15f59e41cb7be6c52
# rename-command FLUSHDB ""
# rename-command FLUSHALL ""
# rename-command DEBUG ""

################################### CLIENTS ####################################

# 最大客户端连接数
maxclients 10000

############################## MEMORY MANAGEMENT ################################

# 最大内存限制（根据容器资源调整）
# maxmemory <bytes>

# 内存淘汰策略
# maxmemory-policy noeviction

############################# LAZY FREEING ####################################

# 惰性删除配置
lazyfree-lazy-eviction no
lazyfree-lazy-expire no
lazyfree-lazy-server-del no
replica-lazy-flush no
lazyfree-lazy-user-del no
lazyfree-lazy-user-flush no

################################ THREADED I/O #################################

# I/O 线程数（0 = 禁用，设置为 CPU 核心数以获得最佳性能）
# io-threads 4

# I/O 线程读取数据
# io-threads-do-reads yes

############################ KERNEL OOM CONTROL ##############################

# OOM Score 调整
oom-score-adj no
oom-score-adj-values 0 200 800

########################### ACTIVE DEFRAGMENTATION #######################

# 主动碎片整理
activedefrag no

################################## TLS/SSL #####################################

# TLS/SSL 配置（默认禁用）
# tls-port 6379
# tls-cert-file redis.crt
# tls-key-file redis.key
